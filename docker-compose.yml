version: "3.9"

services:
  mongodb:
    build:
      context: .
      dockerfile: infra/mongodb/Dockerfile
    container_name: courtroom-trading-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: courtroom_trading
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
